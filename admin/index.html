<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Capitão Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e0a; color: white; }
        
        .login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .login-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.3;
        }
        .login-card {
            position: relative; z-index: 2; background: rgba(17,21,17,0.95);
            backdrop-filter: blur(10px); border-radius: 32px; padding: 48px 40px;
            width: 100%; max-width: 420px; text-align: center;
            border: 1px solid #2e7d32;
        }
        .login-card input {
            width: 100%; padding: 14px; margin: 20px 0;
            background: #0a0e0a; border: 1px solid #2a352a;
            border-radius: 60px; color: white;
        }
        .login-btn {
            width: 100%; padding: 14px; background: #2e7d32;
            border: none; border-radius: 60px; color: white;
            font-weight: bold; cursor: pointer;
        }
        
        .admin-panel { display: none; }
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .admin-header {
            background: #111511; border-radius: 20px; padding: 20px 30px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border: 1px solid #1f2a1f;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #111511; border: 1px solid #1f2a1f; border-radius: 16px; padding: 20px; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 800; color: #2e7d32; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { padding: 10px 24px; background: #111511; border: 1px solid #1f2a1f; border-radius: 40px; cursor: pointer; }
        .tab.active { background: #2e7d32; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-card { background: #111511; border: 1px solid #1f2a1f; border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1f2a1f; }
        th { color: #2e7d32; }
        .btn-logout { background: #dc3545; border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; }
        .developer-footer { text-align: center; padding: 20px; color: #4a4f4a; }
        .developer-footer span { color: #2e7d32; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <img class="login-bg" src="https://i.pinimg.com/originals/15/70/84/157084787880c1ead98ec92332da7094.gif" onerror="this.style.display='none'">
    <div class="login-card">
        <i class="fas fa-shield-alt" style="font-size: 48px; color: #2e7d32;"></i>
        <h2>ACESSO RESTRITO</h2>
        <input type="text" id="loginUser" placeholder="Usuário">
        <input type="password" id="loginPass" placeholder="Senha">
        <button class="login-btn" onclick="fazerLogin()">ENTRAR →</button>
        <div id="loginError" style="color:#dc3545; margin-top:15px; display:none;">Credenciais inválidas</div>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <div class="admin-container">
        <div class="admin-header">
            <h2><i class="fas fa-crown"></i> Capitão Store - Admin</h2>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="statPedidos">0</div><div>Pedidos</div></div>
            <div class="stat-card"><div class="stat-number" id="statVendas">R$ 0</div><div>Vendas</div></div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="abrirTab('pedidos', this)">📦 PEDIDOS</div>
            <div class="tab" onclick="abrirTab('logs', this)">📜 LOGS</div>
        </div>
        
        <div id="tabPedidos" class="tab-content active">
            <div class="admin-card">
                <h3>Últimos Pedidos</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>ID</th><th>Cliente</th><th>CPF</th><th>Endereço</th><th>Total</th><th>Data</th></tr></thead>
                        <tbody id="pedidosBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div id="tabLogs" class="tab-content">
            <div class="admin-card">
                <h3>Logs de Acesso</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>IP</th><th>Tentativa</th><th>Data</th></tr></thead>
                        <tbody id="logsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="developer-footer">developer <span>kakabankerv1</span></div>
    </div>
</div>

<script>
    let token = null;
    
    async function fazerLogin() {
        const username = document.getElementById('loginUser').value;
        const password = document.getElementById('loginPass').value;
        
        const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if (data.success) {
            token = data.token;
            sessionStorage.setItem('adminToken', token);
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            carregarDados();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }
    
    function logout() {
        sessionStorage.removeItem('adminToken');
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
    }
    
    if (sessionStorage.getItem('adminToken')) {
        token = sessionStorage.getItem('adminToken');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        carregarDados();
    }
    
    async function carregarDados() {
        const resPedidos = await fetch('/api/admin/pedidos', { headers: { 'Authorization': `Bearer ${token}` } });
        const dataPedidos = await resPedidos.json();
        if (dataPedidos.success) {
            document.getElementById('pedidosBody').innerHTML = dataPedidos.pedidos.map(p => `
                <tr>
                    <td>${p.pedido_id || p.id}</td>
                    <td>${p.cliente_nome || '-'}</td>
                    <td>${p.cliente_cpf || '-'}</td>
                    <td>${p.endereco_rua || ''}, ${p.endereco_numero || ''}</td>
                    <td>R$ ${parseFloat(p.total).toFixed(2)}</td>
                    <td>${new Date(p.created_at).toLocaleString()}</td>
                </tr>
            `).join('');
            document.getElementById('statPedidos').innerText = dataPedidos.pedidos.length;
        }
        
        const resStats = await fetch('/api/admin/stats', { headers: { 'Authorization': `Bearer ${token}` } });
        const dataStats = await resStats.json();
        if (dataStats.success) {
            document.getElementById('statVendas').innerHTML = `R$ ${dataStats.stats.vendas.toFixed(2)}`;
        }
        
        const resLogs = await fetch('/api/admin/logs', { headers: { 'Authorization': `Bearer ${token}` } });
        const dataLogs = await resLogs.json();
        if (dataLogs.success) {
            document.getElementById('logsBody').innerHTML = dataLogs.logs.map(l => `
                <tr><td>${l.ip || '-'}</td><td>${l.tentativa || '-'}</td><td>${new Date(l.data).toLocaleString()}</td></tr>
            `).join('');
        }
    }
    
    function abrirTab(tabName, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(`tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).classList.add('active');
    }
</script>
</body>
</html>
