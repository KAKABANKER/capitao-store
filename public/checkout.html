<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Capitão Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Jost', sans-serif; background: #fefcf5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .checkout-header { background: white; padding: 20px; border-bottom: 1px solid #eae6de; display: flex; justify-content: space-between; }
        .checkout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin: 30px 0; }
        .form-card { background: white; border-radius: 20px; padding: 25px; border: 1px solid #f0ede5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2d9cc; border-radius: 12px; }
        input:focus { outline: none; border-color: #b68b40; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-buscar { background: #2c3e2f; color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; }
        .payment-methods { display: flex; gap: 15px; margin-bottom: 25px; }
        .payment-btn { flex: 1; padding: 12px; background: #f8f6f0; border: 1px solid #e2d9cc; border-radius: 12px; cursor: pointer; text-align: center; }
        .payment-btn.active { background: #b68b40; color: white; }
        .payment-content { display: none; }
        .payment-content.active { display: block; }
        .pix-area { text-align: center; padding: 20px; background: #f8f6f0; border-radius: 16px; }
        .pix-code { background: #1a1a1a; color: #b68b40; padding: 12px; border-radius: 12px; font-size: 11px; word-break: break-all; margin: 15px 0; }
        .btn-finalizar { width: 100%; padding: 16px; background: #b68b40; color: white; border: none; border-radius: 40px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .resumo-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0ebe2; }
        .resumo-total { font-size: 1.3rem; font-weight: bold; text-align: right; margin: 20px 0; color: #b68b40; }
        @media (max-width: 768px) { .checkout-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header class="checkout-header">
    <h2>CAPITÃO STORE</h2>
    <a href="/" style="color:#b68b40;">← Voltar</a>
</header>

<div class="container">
    <div class="checkout-grid">
        <!-- Dados do Cliente -->
        <div class="form-card">
            <h3>📋 Seus dados</h3>
            <div class="form-group"><label>Nome completo *</label><input type="text" id="nome" placeholder="Digite seu nome"></div>
            <div class="row-2">
                <div class="form-group"><label>Email *</label><input type="email" id="email" placeholder="seu@email.com"></div>
                <div class="form-group"><label>Telefone *</label><input type="text" id="telefone" placeholder="(11) 99999-9999"></div>
            </div>
            <div class="form-group"><label>CPF *</label><input type="text" id="cpf" placeholder="000.000.000-00"></div>
            
            <h3 style="margin-top:20px">📍 Endereço de entrega</h3>
            <div style="display:flex; gap:10px">
                <div class="form-group" style="flex:1"><label>CEP *</label><input type="text" id="cep" placeholder="00000-000"></div>
                <button class="btn-buscar" id="buscarCep">Buscar</button>
            </div>
            <div class="form-group"><label>Rua *</label><input type="text" id="rua"></div>
            <div class="row-2">
                <div class="form-group"><label>Número *</label><input type="text" id="numero"></div>
                <div class="form-group"><label>Complemento</label><input type="text" id="complemento"></div>
            </div>
            <div class="row-2">
                <div class="form-group"><label>Bairro *</label><input type="text" id="bairro"></div>
                <div class="form-group"><label>Cidade *</label><input type="text" id="cidade"></div>
            </div>
            <div class="form-group"><label>UF *</label><input type="text" id="uf" maxlength="2"></div>
        </div>

        <!-- Pagamento e Resumo -->
        <div>
            <div class="form-card">
                <h3>💰 Pagamento</h3>
                <div class="payment-methods">
                    <div class="payment-btn active" data-payment="pix">🇧🇷 PIX</div>
                    <div class="payment-btn" data-payment="card">💳 Cartão</div>
                </div>
                
                <div id="payment-pix" class="payment-content active">
                    <div class="pix-area">
                        <div class="pix-code" id="pixCode">Gerando código PIX...</div>
                        <button class="btn-buscar" onclick="copiarPix()">📋 Copiar código</button>
                    </div>
                </div>
                
                <div id="payment-card" class="payment-content">
                    <div class="form-group"><label>Número do cartão</label><input type="text" id="cardNumero" placeholder="0000 0000 0000 0000"></div>
                    <div class="form-group"><label>Nome no cartão</label><input type="text" id="cardNome"></div>
                    <div class="row-2">
                        <div class="form-group"><label>Validade</label><input type="text" id="cardValidade" placeholder="MM/AA"></div>
                        <div class="form-group"><label>CVV</label><input type="password" id="cardCvv" maxlength="4"></div>
                    </div>
                    <div class="form-group"><label>Parcelas</label><select id="cardParcelas"></select></div>
                </div>
            </div>
            
            <div class="form-card">
                <h3>🛍️ Resumo</h3>
                <div id="resumoItens"></div>
                <div class="resumo-total" id="resumoTotal"></div>
                <button class="btn-finalizar" id="finalizarBtn">✅ FINALIZAR PEDIDO</button>
            </div>
        </div>
    </div>
</div>

<script>
    let carrinho = JSON.parse(localStorage.getItem('checkout_carrinho') || '[]');
    let total = 0;

    function carregarResumo() {
        total = carrinho.reduce((s, i) => s + (i.preco * i.quantidade), 0);
        document.getElementById('resumoItens').innerHTML = carrinho.map(i => `
            <div class="resumo-item"><span>${i.nome} x ${i.quantidade}</span><span>R$ ${(i.preco * i.quantidade).toFixed(2)}</span></div>
        `).join('');
        document.getElementById('resumoTotal').innerHTML = `Total: R$ ${total.toFixed(2)}`;
        
        const parcelas = document.getElementById('cardParcelas');
        if (parcelas) {
            parcelas.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                parcelas.innerHTML += `<option value="${i}">${i}x de R$ ${(total / i).toFixed(2)}</option>`;
            }
        }
        
        document.getElementById('pixCode').innerHTML = `PIX COPIA E COLA\n00020126360014br.gov.bcb.pix0114capitao@store.com5204000053039865404${total.toFixed(2).replace('.', '')}5802BR5925CAPITAO STORE6009SAO PAULO6304${Math.random().toString(36).substring(2, 6).toUpperCase()}`;
    }

    async function buscarCep() {
        const cep = document.getElementById('cep').value.replace(/\D/g, '');
        if (cep.length !== 8) return alert('CEP inválido');
        
        const res = await fetch(`/api/cep/${cep}`);
        const data = await res.json();
        if (data.success) {
            document.getElementById('rua').value = data.logradouro || '';
            document.getElementById('bairro').value = data.bairro || '';
            document.getElementById('cidade').value = data.cidade || '';
            document.getElementById('uf').value = data.uf || '';
        } else alert('CEP não encontrado');
    }

    async function finalizarPedido() {
        const dados = {
            cliente_nome: document.getElementById('nome').value,
            cliente_email: document.getElementById('email').value,
            cliente_telefone: document.getElementById('telefone').value,
            cliente_cpf: document.getElementById('cpf').value,
            endereco_cep: document.getElementById('cep').value,
            endereco_rua: document.getElementById('rua').value,
            endereco_numero: document.getElementById('numero').value,
            endereco_complemento: document.getElementById('complemento').value,
            endereco_bairro: document.getElementById('bairro').value,
            endereco_cidade: document.getElementById('cidade').value,
            endereco_uf: document.getElementById('uf').value,
            itens: carrinho,
            subtotal: total,
            total: total,
            forma_pagamento: document.querySelector('.payment-btn.active').innerText.includes('PIX') ? 'PIX' : 'Cartão'
        };
        
        if (!dados.cliente_nome || !dados.cliente_email || !dados.endereco_rua) {
            return alert('Preencha todos os campos obrigatórios');
        }
        
        const res = await fetch('/api/pedido', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });
        
        const result = await res.json();
        if (result.success) {
            alert(`Pedido #${result.pedido_id} realizado!`);
            localStorage.removeItem('carrinho');
            localStorage.removeItem('checkout_carrinho');
            window.location.href = '/';
        } else alert('Erro ao finalizar pedido');
    }

    document.querySelectorAll('.payment-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.payment-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`payment-${btn.dataset.payment}`).classList.add('active');
        };
    });

    document.getElementById('buscarCep').onclick = buscarCep;
    document.getElementById('finalizarBtn').onclick = finalizarPedido;
    
    document.getElementById('cep').oninput = (e) => { let v = e.target.value.replace(/\D/g, ''); if(v.length>=5) v=v.slice(0,5)+'-'+v.slice(5); e.target.value=v.slice(0,9); };
    document.getElementById('cpf').oninput = (e) => { let v = e.target.value.replace(/\D/g, ''); if(v.length>=3) v=v.slice(0,3)+'.'+v.slice(3); if(v.length>=7) v=v.slice(0,7)+'.'+v.slice(7); if(v.length>=11) v=v.slice(0,11)+'-'+v.slice(11); e.target.value=v.slice(0,14); };
    document.getElementById('telefone').oninput = (e) => { let v = e.target.value.replace(/\D/g, ''); if(v.length>=2) v='('+v.slice(0,2)+') '+v.slice(2); if(v.length>=10) v=v.slice(0,10)+'-'+v.slice(10); e.target.value=v.slice(0,15); };
    
    carregarResumo();
</script>
</body>
</html>
